name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (faster, no signing needed)
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/bmu-agent.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bmu-agent-apk
          path: output/bmu-agent.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "BMU Agent Android - Latest"
          files: output/bmu-agent.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
